# Build and push Docker image to GitHub Container Registry (ghcr.io) on tag push.
# Image: ghcr.io/<owner>/uim-go:<tag> (e.g. ghcr.io/convexwf/uim-go:v1.0.0)
# Final image contains only binary + migrations; no source code (multi-stage Dockerfile).

name: Publish Docker to ghcr.io

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Keep latest 10 semver container versions
        uses: actions/github-script@v7
        with:
          script: |
            const keep = 10;
            const owner = context.repo.owner;
            const packageName = context.repo.repo;

            function parseVersion(tag) {
              const match = String(tag).replace(/^v/, '').match(/^(\d+)\.(\d+)\.(\d+)$/);
              return match ? match.slice(1).map(Number) : null;
            }

            function compareVersion(a, b) {
              for (let i = 0; i < 3; i += 1) {
                if (a[i] !== b[i]) return a[i] - b[i];
              }
              return 0;
            }

            async function listVersionsAsOrg() {
              const versions = [];
              for (let page = 1; ; page += 1) {
                const response = await github.request(
                  'GET /orgs/{org}/packages/{package_type}/{package_name}/versions',
                  {
                    org: owner,
                    package_type: 'container',
                    package_name: packageName,
                    per_page: 100,
                    page,
                  },
                );
                versions.push(...response.data);
                if (response.data.length < 100) return { ownerType: 'org', versions };
              }
            }

            async function listVersionsAsUser() {
              const versions = [];
              for (let page = 1; ; page += 1) {
                const response = await github.request(
                  'GET /users/{username}/packages/{package_type}/{package_name}/versions',
                  {
                    username: owner,
                    package_type: 'container',
                    package_name: packageName,
                    per_page: 100,
                    page,
                  },
                );
                versions.push(...response.data);
                if (response.data.length < 100) return { ownerType: 'user', versions };
              }
            }

            async function listVersions() {
              try {
                return await listVersionsAsOrg();
              } catch (error) {
                core.info(`Org package lookup failed, falling back to user scope: ${error.message}`);
                return listVersionsAsUser();
              }
            }

            async function deleteVersion(ownerType, versionId) {
              if (ownerType === 'org') {
                await github.request(
                  'DELETE /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}',
                  {
                    org: owner,
                    package_type: 'container',
                    package_name: packageName,
                    package_version_id: versionId,
                  },
                );
                return;
              }

              await github.request(
                'DELETE /users/{username}/packages/{package_type}/{package_name}/versions/{package_version_id}',
                {
                  username: owner,
                  package_type: 'container',
                  package_name: packageName,
                  package_version_id: versionId,
                },
              );
            }

            const { ownerType, versions } = await listVersions();
            const versioned = versions
              .map((item) => {
                const tags = item.metadata?.container?.tags ?? [];
                const semverTag = tags.find((tag) => parseVersion(tag) !== null);
                if (!semverTag) return null;
                return {
                  id: item.id,
                  tag: semverTag,
                  version: parseVersion(semverTag),
                };
              })
              .filter((item) => item !== null);

            versioned.sort((left, right) => compareVersion(left.version, right.version));

            const removeCount = Math.max(0, versioned.length - keep);
            const removable = versioned.slice(0, removeCount);

            core.info(`Found ${versioned.length} semver package versions, removing ${removable.length}.`);

            for (const item of removable) {
              core.info(`Deleting package version ${item.tag} (id=${item.id}).`);
              await deleteVersion(ownerType, item.id);
            }
