# Build and push Docker image to GitHub Container Registry (ghcr.io) on tag push.
# Image: ghcr.io/<owner>/uim-go:<tag> (e.g. ghcr.io/convexwf/uim-go:v1.0.0)
# Final image contains only binary + migrations; no source code (multi-stage Dockerfile).

name: Publish Docker to ghcr.io

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
